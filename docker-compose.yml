version: '3.8'

services:
  orchestrator:
    build: .
    image: ai-guardian:latest
    container_name: guardian_orchestrator
    environment:
      - ROLE=SERVER
      - PORT=7860
      - FLOWER_PORT=8095
      - ROUNDS=5
      - SUPABASE_URL=https://tilimltxgeucefxzerqi.supabase.co
      - SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpbGltbHR4Z2V1Y2VmeHplcnFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc2MjQyNTQsImV4cCI6MjA4MzIwMDI1NH0.lwaCJyTRW6jNsfQJ32R_wAwp11yj6bvsJ4fzC0EX_00
      - OMP_NUM_THREADS=2
      - MKL_NUM_THREADS=2
      - PYTHONUNBUFFERED=1
    ports:
      - "7860:7860"
      - "8095:8095"
    networks:
      - fl-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    healthcheck:
      test: curl -f http://localhost:7860/api/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  client-1:
    image: ai-guardian:latest
    container_name: guardian_client_1
    depends_on:
      orchestrator:
        condition: service_healthy
    environment:
      - ROLE=CLIENT
      - CLIENT_ID=1
      - NUM_CLIENTS=2
      - SERVER_IP=orchestrator
      - FLOWER_PORT=8095
      - OMP_NUM_THREADS=1
    networks:
      - fl-network
    deploy:
      resources:
        limits:
          memory: 1G
    restart: on-failure

  client-2:
    image: ai-guardian:latest
    container_name: guardian_client_2
    depends_on:
      orchestrator:
        condition: service_healthy
    environment:
      - ROLE=CLIENT
      - CLIENT_ID=2
      - NUM_CLIENTS=2
      - SERVER_IP=orchestrator
      - FLOWER_PORT=8095
      - OMP_NUM_THREADS=1
    networks:
      - fl-network
    deploy:
      resources:
        limits:
          memory: 1G
    restart: on-failure

networks:
  fl-network:
    driver: bridge
